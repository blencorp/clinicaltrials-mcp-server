name: schema-drift

on:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Verify pinned schema against live /openapi.json
        id: verify
        run: pnpm verify:schema
        continue-on-error: true

      - name: Open issue on drift
        if: steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Pinned ClinicalTrials.gov schema has drifted from upstream";
            const body = [
              "The weekly schema-drift job detected changes to",
              "`https://clinicaltrials.gov/api/v2/openapi.json` that are not reflected",
              "in `schema/openapi.pinned.json`.",
              "",
              "To refresh locally:",
              "",
              "```bash",
              "pnpm regen:sdk",
              "pnpm test",
              "```",
              "",
              "Run: ${{ github.run_url }}",
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "schema-drift",
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["schema-drift"],
            });
